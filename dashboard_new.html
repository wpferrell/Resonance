<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f7f8fa;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.panel {
  width: 260px; background: #ffffff;
  border: 0.5px solid #e2e8f0; border-radius: 14px;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.panel-body { flex: 1; padding: 20px 16px 16px; display: flex; flex-direction: column; }
.r-header { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
.r-dot { width: 6px; height: 6px; border-radius: 50%; background: #4fd1c5; flex-shrink: 0; }
.r-dot.live { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.r-name { font-size: 11px; color: #94a3b8; font-weight: 500; letter-spacing: 0.02em; }
.r-live { font-size: 10px; color: #4fd1c5; margin-left: auto; }
.feeling { text-align: center; padding: 4px 0 20px; }
.feeling-emoji { font-size: 13px; font-weight: 600; color: #4fd1c5; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.feeling-word { font-size: 16px; font-weight: 500; color: #1a202c; margin-bottom: 5px; font-family: Georgia, serif; }
.feeling-short { font-size: 12px; color: #94a3b8; line-height: 1.5; font-style: italic; }
.live-bar { background: #f8fafc; border-radius: 8px; padding: 8px 10px; margin-bottom: 16px; display: none; }
.live-bar.visible { display: block; }
.live-label { font-size: 10px; color: #94a3b8; margin-bottom: 4px; }
.live-emotion { font-size: 13px; font-weight: 500; color: #1a202c; }
.live-conf { font-size: 10px; color: #4fd1c5; }
.bars { display: flex; flex-direction: column; gap: 11px; padding-bottom: 20px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 11px; color: #94a3b8; width: 46px; flex-shrink: 0; }
.bar-track { flex: 1; height: 4px; background: #f1f5f9; border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width 0.7s ease, background 0.7s ease; }
.bar-word { font-size: 11px; color: #94a3b8; width: 52px; text-align: right; flex-shrink: 0; }
.senses-block {
  background: #E1F5EE; border-left: 2px solid #4fd1c5;
  border-radius: 0 8px 8px 0; padding: 11px 13px; margin-bottom: 20px;
}
.senses-header { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
.senses-dot { width: 4px; height: 4px; border-radius: 50%; background: #4fd1c5; flex-shrink: 0; }
.senses-title { font-size: 9px; font-weight: 600; color: #0F6E56; letter-spacing: 0.08em; text-transform: uppercase; }
.senses-text { font-size: 12px; color: #085041; line-height: 1.65; font-family: Georgia, serif; }
.soft-rule { border: none; border-top: 0.5px solid #e2e8f0; margin-bottom: 16px; }
.correction-q { font-size: 11px; color: #94a3b8; margin-bottom: 10px; }
.chips { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.chip {
  font-size: 11px; padding: 6px 8px; border-radius: 10px;
  border: 0.5px solid #e2e8f0; color: #64748b; background: #f8fafc;
  cursor: pointer; text-align: center; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  line-height: 1.3; transition: all 0.15s;
}
.chip.detected { border-color: #94a3b8; color: #1a202c; background: #ffffff; }
.chip.saved { background: #E1F5EE; color: #085041; border-color: #9FE1CB; }
.chip:hover:not(.saved) { border-color: #94a3b8; }
.panel-bottom { border-top: 0.5px solid #e2e8f0; padding: 10px 14px; flex-shrink: 0; background: #ffffff; }
.results { display: none; flex-direction: column; gap: 3px; margin-bottom: 6px; }
.results.visible { display: flex; }
.result-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  cursor: pointer; border: 0.5px solid #e2e8f0; border-radius: 8px;
  background: #ffffff; font-size: 12px; color: #1a202c; transition: background 0.1s;
}
.result-item:hover { background: #f8fafc; }
.saved-note { display: none; font-size: 11px; color: #085041; padding: 3px 2px; margin-bottom: 4px; }
.saved-note.visible { display: block; }
.search-wrap { position: relative; }
.search-input {
  width: 100%; background: #f8fafc; border: 0.5px solid #e2e8f0;
  border-radius: 14px; padding: 6px 24px 6px 11px;
  font-size: 11px; color: #1a202c; outline: none;
  transition: border-color 0.15s; font-family: inherit;
}
.search-input::placeholder { color: #94a3b8; }
.search-input:focus { border-color: #94a3b8; }
.clear-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: #94a3b8; cursor: pointer; display: none;
  line-height: 1; background: none; border: none;
}
.clear-btn.visible { display: block; }
.loading { text-align: center; padding: 40px 20px; font-size: 12px; color: #94a3b8; font-style: italic; }
</style>
</head>
<body>
<div class="panel" id="panel">
  <div class="loading">Resonance is reading...</div>
</div>

<script>
const allEmotions=[{e:'😌',n:'calm',d:'peaceful, at ease'},{e:'😟',n:'anxious',d:'worried, on edge'},{e:'😤',n:'frustrated',d:'annoyed, blocked'},{e:'😔',n:'sad',d:'low, heavy'},{e:'😡',n:'angry',d:'mad, upset'},{e:'😰',n:'overwhelmed',d:'too much at once'},{e:'😐',n:'numb',d:'flat, disconnected'},{e:'🥺',n:'hurt',d:'wounded, let down'},{e:'😊',n:'happy',d:'good, content'},{e:'😁',n:'excited',d:'energised'},{e:'🥱',n:'tired',d:'drained, exhausted'},{e:'😕',n:'confused',d:'unsure, lost'},{e:'😓',n:'stressed',d:'under pressure'},{e:'😬',n:'uneasy',d:'tense, uncertain'},{e:'😶',n:'empty',d:'hollow, nothing there'},{e:'😩',n:'defeated',d:'worn out'},{e:'😪',n:'lonely',d:'isolated'},{e:'🙂',n:'okay',d:'fine, getting by'},{e:'😢',n:'tearful',d:'close to crying'},{e:'😑',n:'done',d:'fed up, checked out'}];

function lev(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}

let panelData = null;

function render(data){
  panelData = data;
  const panel=document.getElementById('panel');
  const n=Math.min(data.chips.length,6);
  panel.innerHTML=`
    <div class="panel-body">
      <div class="r-header">
        <div class="r-dot" id="rDot"></div>
        <div class="r-name">Resonance</div>
        <div class="r-live" id="rLive"></div>
      </div>
      <div class="feeling">
        <span style="font-size:44px;display:block;margin-bottom:10px;line-height:1">${data.pill.emoji}</span>
        <div class="feeling-word">You seem ${data.pill.word}</div>
        <div class="feeling-short">${data.pill.short}</div>
      </div>
      <div class="live-bar" id="liveBar">
        <div class="live-label">just now</div>
        <div><span class="live-emotion" id="liveEmotion"></span> <span class="live-conf" id="liveConf"></span></div>
      </div>
      <div class="bars">
        <div class="bar-row">
          <div class="bar-label">mood</div>
          <div class="bar-track"><div class="bar-fill" id="moodFill" style="width:${data.mood.pct}%;background:${data.mood.color}"></div></div>
          <div class="bar-word" id="moodWord">${data.mood.word}</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">energy</div>
          <div class="bar-track"><div class="bar-fill" id="energyFill" style="width:${data.energy.pct}%;background:${data.energy.color}"></div></div>
          <div class="bar-word" id="energyWord">${data.energy.word}</div>
        </div>
      </div>
      <div class="senses-block">
        <div class="senses-header">
          <div class="senses-dot"></div>
          <div class="senses-title">Resonance senses</div>
        </div>
        <div class="senses-text">${data.senses}</div>
      </div>
      <hr class="soft-rule">
      <div class="correction-q">does this feel right?</div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="panel-bottom">
      <div class="results" id="results"></div>
      <div class="saved-note" id="savedNote"></div>
      <div class="search-wrap">
        <input class="search-input" id="searchInput" placeholder="how do you feel?" autocomplete="off"/>
        <button class="clear-btn" id="clearBtn">x</button>
      </div>
    </div>`;

  const chips=document.getElementById('chips');
  data.chips.forEach(c=>{
    const el=document.createElement('div');
    el.className='chip'+(c.d?' detected':'');
    el.textContent=c.e+' '+c.n;
    if(!c.d)el.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('saved'));el.classList.add('saved');el.textContent='saved '+c.e+' '+c.n;};
    chips.appendChild(el);
  });

  const si=document.getElementById('searchInput');
  const cb=document.getElementById('clearBtn');
  const results=document.getElementById('results');
  const savedNote=document.getElementById('savedNote');
  cb.onclick=clearSearch;

  si.addEventListener('input',function(){
    const q=this.value.trim().toLowerCase();
    cb.classList.toggle('visible',q.length>0);
    results.classList.remove('visible');results.innerHTML='';savedNote.classList.remove('visible');
    if(!q)return;
    const matches=allEmotions.filter(e=>e.n.includes(q)||e.d.includes(q)).slice(0,3);
    if(matches.length){
      matches.forEach(e=>{
        const d=document.createElement('div');d.className='result-item';
        d.innerHTML='<span style="font-size:16px">'+e.e+'</span><span>'+e.n+' <span style="font-size:11px;color:#94a3b8">· '+e.d+'</span></span>';
        d.onclick=()=>{clearSearch();savedNote.textContent=e.n+' saved.';savedNote.classList.add('visible');};
        results.appendChild(d);
      });
      results.classList.add('visible');
    } else if(q.length>2){
      let typo=null,bd=2;
      allEmotions.forEach(e=>{const dist=lev(q,e.n);if(dist>0&&dist<=bd){typo=e;bd=dist;}});
      const d=document.createElement('div');d.className='result-item';
      if(typo){
        d.innerHTML='<span style="font-size:16px">'+typo.e+'</span><span>Did you mean <strong>'+typo.n+'</strong>?</span>';
        d.onclick=()=>{clearSearch();savedNote.textContent=typo.n+' saved.';savedNote.classList.add('visible');};
      } else {
        d.innerHTML='<span>save "'+q+'"</span><span style="font-size:11px;color:#94a3b8">Resonance will learn this</span>';
        d.onclick=()=>{clearSearch();savedNote.textContent='"'+q+'" saved.';savedNote.classList.add('visible');};
      }
      results.appendChild(d);results.classList.add('visible');
    }
  });

  function clearSearch(){si.value='';cb.classList.remove('visible');results.classList.remove('visible');results.innerHTML='';}
}

// WebSocket for live updates
const socket = io();
socket.on('update', function(data){
  const dot = document.getElementById('rDot');
  const live = document.getElementById('rLive');
  const liveBar = document.getElementById('liveBar');
  const liveEmotion = document.getElementById('liveEmotion');
  const liveConf = document.getElementById('liveConf');
  if(dot) dot.classList.add('live');
  if(live) live.textContent = 'live';
  if(liveBar) liveBar.classList.add('visible');
  if(liveEmotion) liveEmotion.textContent = data.emotion;
  if(liveConf) liveConf.textContent = data.confidence + '% confidence';
  setTimeout(()=>{ if(live) live.textContent=''; if(dot) dot.classList.remove('live'); }, 3000);
});

function load(){
  fetch('/api/state').then(r=>r.json()).then(data=>{
    if(data.error){document.getElementById('panel').innerHTML='<div class="loading">Could not load: '+data.error+'</div>';}
    else{render(data);}
  }).catch(()=>{
    if(!panelData) document.getElementById('panel').innerHTML='<div class="loading">Resonance is not connected.</div>';
  });
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
